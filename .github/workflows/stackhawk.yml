name: StackHawk Security Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6am UTC

jobs:
  stackhawk:
    name: HawkScan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Get JWT token
        id: auth
        run: |
          TOKEN=$(curl -s -X POST https://donorcrm-web.onrender.com/api/v1/auth/login/ \
            -H "Content-Type: application/json" \
            -d '{"email":"${{ secrets.SCAN_USER_EMAIL }}","password":"${{ secrets.SCAN_USER_PASSWORD }}"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access'])")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Fetch OpenAPI schema
        run: |
          curl -s -o openapi-schema.yaml \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            https://donorcrm-web.onrender.com/api/v1/schema/

      - name: Run HawkScan
        uses: stackhawk/hawkscan-action@577fc49409a1f6e57f41c8eb8a6d02fe2ea0d79b # v2
        with:
          apiKey: ${{ secrets.HAWK_API_KEY }}
          configurationFiles: stackhawk.yml
        env:
          SCAN_TOKEN: ${{ steps.auth.outputs.token }}
