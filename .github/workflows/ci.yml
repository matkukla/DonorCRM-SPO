name: CI

# The verification gate. Everything downstream (Dependabot bumps, AI-authored
# fix PRs) is only trustworthy because this runs on every PR. Branch protection
# should require these jobs before merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (pytest + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        # Tests run on SQLite in-memory (config.settings.test), so prod.txt is
        # not required; dev.txt pulls in base.txt + pytest/black/isort/flake8.
        run: pip install -r requirements/dev.txt

      # HARD gates: the backend lint debt was cleaned up, so these now block.
      - name: black
        run: black --check apps/ config/

      - name: isort
        run: isort --check-only apps/ config/

      - name: flake8
        run: flake8 apps/ config/

      # HARD gate: tests + 80% coverage must pass.
      - name: pytest (80% coverage gate)
        # --cov-fail-under=80 is enforced via pyproject.toml addopts.
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: pytest

  frontend:
    name: frontend (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Still ADVISORY: ESLint has ~51 pre-existing errors, many from strict
      # react-hooks rules (conditional hook calls, set-state-in-effect) that
      # need careful per-component refactoring. The frontend has no unit-test
      # net, so forcing these blind risks regressions — tracked as a separate,
      # app-verified effort before this becomes a hard gate.
      - name: ESLint
        run: npm run lint
        continue-on-error: true

      # HARD gate: the TypeScript compile + production build must succeed.
      - name: Build (tsc + vite)
        run: npm run build
