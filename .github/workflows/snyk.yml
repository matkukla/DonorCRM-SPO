name: snyk

# Snyk security scanning across all four product surfaces. Advisory for now
# (continue-on-error) so it reports without blocking PRs — mirrors the bandit
# job in security.yml. Tighten to hard gates (drop continue-on-error, raise
# --severity-threshold) once the baseline is triaged.
#
# Setup: add a repository secret SNYK_TOKEN (Settings > Secrets and variables >
# Actions). Get the token from https://app.snyk.io > Account settings > API token.
# Without the secret, every job is skipped (see the `if:` guard) rather than
# failing — so forks and pre-setup pushes stay green.

on:
  # Manual trigger from the Actions tab — re-run on demand without a commit
  # (e.g. after rotating the token, tweaking thresholds, or triaging).
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 09:00 UTC — catches new advisories against pinned deps,
    # aligned with the pip-audit schedule in security.yml.
    - cron: "0 9 * * 1"

# Each test job uploads SARIF to the GitHub Security > Code scanning tab, so
# findings show up as native alerts (and inline PR annotations) instead of only
# living in the Actions logs. security-events: write is required for the upload.
permissions:
  contents: read
  security-events: write

jobs:
  # ── Open Source (SCA): Python + npm dependency CVEs ──────────────────────
  # The npm/frontend dependency tree currently has no CVE scanner, so this is
  # the highest-value addition. Python overlaps pip-audit but feeds the same
  # unified report.
  sca:
    name: open source (SCA)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install frontend deps (for npm SCA)
        working-directory: frontend
        run: npm ci

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk test — Python (all requirements files)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then echo "SNYK_TOKEN not set — skipping"; exit 0; fi
          # Snyk's --file parse of raw requirements/*.txt fails with
          # SNYK-OS-PYTHON-0013 because transitive deps aren't pinned. Instead,
          # install each file into an isolated venv and let Snyk test the fully
          # resolved environment. Each manifest is scanned independently and
          # writes its own SARIF for upload to the Security tab.
          for req in base prod dev; do
            echo "::group::Snyk test — requirements/${req}.txt"
            python -m venv "/tmp/venv-${req}"
            # shellcheck disable=SC1090
            . "/tmp/venv-${req}/bin/activate"
            pip install --quiet --upgrade pip
            pip install --quiet -r "requirements/${req}.txt"
            # `|| true` so a non-zero exit from findings still lets the loop
            # continue and the SARIF file get written for every manifest.
            snyk test --command="/tmp/venv-${req}/bin/python" \
              --severity-threshold=high \
              --sarif-file-output="snyk-py-${req}.sarif" || true
            deactivate
            echo "::endgroup::"
          done

      - name: Upload Python SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-py-base.sarif
          category: snyk-py-base

      - name: Upload Python SARIF (prod)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-py-prod.sarif
          category: snyk-py-prod

      - name: Upload Python SARIF (dev)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-py-dev.sarif
          category: snyk-py-dev

      - name: Snyk test — npm (frontend)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then echo "SNYK_TOKEN not set — skipping"; exit 0; fi
          snyk test --file=frontend/package.json \
            --severity-threshold=high \
            --sarif-file-output=snyk-npm.sarif || true

      - name: Upload npm SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-npm.sarif
          category: snyk-npm

  # ── Snyk Code (SAST): Python + TypeScript ────────────────────────────────
  # Overlaps bandit on Python but extends static analysis to the TS/React
  # frontend, which bandit cannot see.
  code:
    name: code (SAST)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk Code test
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then echo "SNYK_TOKEN not set — skipping"; exit 0; fi
          snyk code test --severity-threshold=high \
            --sarif-file-output=snyk-code.sarif || true

      - name: Upload Code SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

  # ── Container: base-image OS CVEs for both Dockerfiles ───────────────────
  container:
    name: container
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Build images
        run: |
          docker build -t donorcrm:dev  -f Dockerfile .
          docker build -t donorcrm:prod -f Dockerfile.prod .

      - name: Snyk container test — dev
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then echo "SNYK_TOKEN not set — skipping"; exit 0; fi
          snyk container test donorcrm:dev --file=Dockerfile \
            --severity-threshold=high \
            --sarif-file-output=snyk-container-dev.sarif || true

      - name: Upload container SARIF (dev)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-container-dev.sarif
          category: snyk-container-dev

      - name: Snyk container test — prod
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then echo "SNYK_TOKEN not set — skipping"; exit 0; fi
          snyk container test donorcrm:prod --file=Dockerfile.prod \
            --severity-threshold=high \
            --sarif-file-output=snyk-container-prod.sarif || true

      - name: Upload container SARIF (prod)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-container-prod.sarif
          category: snyk-container-prod

  # ── IaC: config misconfigurations (Dockerfiles, compose, render.yaml) ────
  iac:
    name: iac
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk IaC test
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then echo "SNYK_TOKEN not set — skipping"; exit 0; fi
          # Scan only real infra files. Auto-discovery (bare `snyk iac test`)
          # walks the repo and tries to parse frontend/tsconfig.*.json as IaC,
          # failing with SNYK-CLI-0012 (those are JSONC with comments, not IaC).
          # Listing targets explicitly keeps the scan to actual infra config.
          snyk iac test \
            Dockerfile \
            Dockerfile.prod \
            docker-compose.yml \
            render.yaml \
            --severity-threshold=high \
            --sarif-file-output=snyk-iac.sarif || true

      - name: Upload IaC SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-iac.sarif
          category: snyk-iac

  # ── Monitor: push a snapshot to the Snyk dashboard for continuous alerts ──
  # Runs only on push to main (NOT PRs or the cron) — a snapshot should reflect
  # what is actually merged, and running on PRs would spam the dashboard with
  # throwaway projects. Once uploaded, Snyk re-checks these snapshots server-
  # side as new CVEs are disclosed and alerts/opens fix PRs without waiting for
  # the next CI run. The main gap this closes vs. the weekly cron + Dependabot
  # is container base-image drift (python:3.11-slim OS CVEs over time).
  # `snyk monitor` reports upload status, not findings, so failures here should
  # never break a merge — hence continue-on-error.
  monitor:
    name: monitor (dashboard snapshot)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install frontend deps (for npm snapshot)
        working-directory: frontend
        run: npm ci

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Monitor — Python deps
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then echo "SNYK_TOKEN not set — skipping"; exit 0; fi
          # Same approach as the SCA test job: install each manifest into an
          # isolated venv so Snyk monitors the fully resolved tree rather than
          # parsing raw requirements/*.txt (which fails SNYK-OS-PYTHON-0013).
          for req in base prod dev; do
            echo "::group::Snyk monitor — requirements/${req}.txt"
            python -m venv "/tmp/venv-${req}"
            # shellcheck disable=SC1090
            . "/tmp/venv-${req}/bin/activate"
            pip install --quiet --upgrade pip
            pip install --quiet -r "requirements/${req}.txt"
            snyk monitor --command="/tmp/venv-${req}/bin/python" --project-name="donorcrm-py-${req}"
            deactivate
            echo "::endgroup::"
          done

      - name: Monitor — npm deps
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then echo "SNYK_TOKEN not set — skipping"; exit 0; fi
          snyk monitor --file=frontend/package.json --project-name=donorcrm-frontend

      - name: Monitor — code (SAST)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then echo "SNYK_TOKEN not set — skipping"; exit 0; fi
          snyk code test --report --project-name=donorcrm-code || true

      - name: Build images
        run: |
          docker build -t donorcrm:dev  -f Dockerfile .
          docker build -t donorcrm:prod -f Dockerfile.prod .

      - name: Monitor — containers
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then echo "SNYK_TOKEN not set — skipping"; exit 0; fi
          snyk container monitor donorcrm:dev  --file=Dockerfile      --project-name=donorcrm-container-dev
          snyk container monitor donorcrm:prod --file=Dockerfile.prod --project-name=donorcrm-container-prod
