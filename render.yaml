# Render Blueprint for DonorCRM
# https://render.com/docs/blueprint-spec

services:
  # Frontend (React/Vite)
  - type: web
    name: donorcrm-frontend
    runtime: static
    buildCommand: npm install && npx vite build
    staticPublishPath: ./dist
    rootDir: frontend
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://donorcrm-web.onrender.com; frame-ancestors 'none'; form-action 'self'; base-uri 'self'"
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=(), payment=()"
      # HSTS: instructs browsers to use HTTPS for this host (and subdomains)
      # for the next year, including a preload-list opt-in. The Django API
      # service emits the same header via SECURE_HSTS_* settings; this
      # mirrors it on the static front-end so a user landing on the SPA
      # before any API call is also protected.
      - path: /*
        name: Strict-Transport-Security
        value: "max-age=31536000; includeSubDomains; preload"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: VITE_API_BASE_URL
        value: https://donorcrm-web.onrender.com/api/v1

  # Web Service
  - type: web
    name: donorcrm-web
    env: python
    buildCommand: pip install -r requirements/prod.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --workers 3 --threads 2 --timeout 60 --max-requests 1000 --max-requests-jitter 100
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: donorcrm-web.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://donorcrm-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://donorcrm-frontend.onrender.com,https://donorcrm-web.onrender.com
      - key: JWT_ACCESS_LIFETIME_MINUTES
        value: "60"
      - key: DATABASE_URL
        fromDatabase:
          name: donorcrm-db
          property: connectionString
      # Redis not needed without Celery
      # - key: REDIS_URL
      #   fromService:
      #     type: redis
      #     name: donorcrm-redis
      #     property: connectionString

  # NOTE: Celery services disabled to reduce costs. Uncomment to re-enable.
